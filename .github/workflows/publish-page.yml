name: publish-page

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install wasm-pack
        run: curl https://wasm-bindgen.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Fetch subprojects
        run: ./scripts/clone-repos.sh CI
      - name: Generate page
        run: ./scripts/generate-page.sh
      - name: Add GSC files
        run: cp .gsc/* page
      - uses: actions/upload-pages-artifact@v4
        with:
          path: page
  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4
  notify-failed:
    runs-on: ubuntu-latest
    needs: [ build, publish ]
    if: |
      always()
      &&
      (github.event_name == 'push' || github.event_name == 'schedule')
      &&
      (needs.build.result != 'success' || needs.publish.result != 'success')
    permissions:
      issues: write
    steps:
      - name: Notify failed build
        uses: jayqi/failed-build-issue-action@1a893bbf43ef1c2a8705e2b115cd4f0fe3c5649b # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label-name: 'auto-publish'
          title-template: 'Auto Publish Failed'
